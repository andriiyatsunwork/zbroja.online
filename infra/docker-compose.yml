services:
  postgres:
    image: postgres:16-alpine
    container_name: zbroja_postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      # ЗМІНЕНО: тепер ми слухаємо порт 5433 на вашому Windows, щоб уникнути конфліктів
      - "5433:5432"
    volumes:
      # ЗМІНЕНО: нова назва диска гарантує, що база створиться абсолютно чистою
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zbroja_admin -d zbroja_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zbroja_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_v2:
  redis_data: