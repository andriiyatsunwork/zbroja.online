services:
  postgres:
    image: postgres:16-alpine
    container_name: zbroja_postgres
    restart: unless-stopped
    # Завантажуємо змінні з .env файлу
    env_file:
      - .env # або ../.env, залежно від того, де лежить файл
    # КРИТИЧНЕ ВИПРАВЛЕННЯ:
    environment:
      POSTGRES_USER: ${DB_USER:-zbroja_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zbroja123}
      POSTGRES_DB: ${DB_NAME:-zbroja_db}
    ports:
      - "5433:5432"
    volumes:
      # Змінено на v3 для 100% гарантії чистої ініціалізації
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      # Виправлено користувача з zbroja_admin на правильну змінну
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zbroja_user} -d ${DB_NAME:-zbroja_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zbroja_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_v3:
  redis_data: